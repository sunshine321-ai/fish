services:
  mirofish:
    image: ghcr.nju.edu.cn/666ghj/mirofish:latest
    # Original image:
    # image: ghcr.io/666ghj/mirofish:latest
    container_name: mirofish
    env_file:
      - .env
    ports:
      - "3000:3000"
      - "5001:5001"
    restart: unless-stopped
    volumes:
      - ./backend/uploads:/app/backend/uploads
      # Local maintenance patches without rebuilding the remote image.
      - ./backend/app/api/simulation.py:/app/backend/app/api/simulation.py:ro
      - ./frontend/src/api/simulation.js:/app/frontend/src/api/simulation.js:ro
      - ./frontend/src/components/HistoryDatabase.vue:/app/frontend/src/components/HistoryDatabase.vue:ro
